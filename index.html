<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Gastos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f5f9;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:55px;
    margin-bottom:30px;
    color:#0f172a;
}

.cards{
    display:flex;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:280px;
    padding:30px;
    border-radius:20px;
    background:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.verde{
    border:2px solid #c5f3cf;
}

.vermelho{
    border:2px solid #ffd0d0;
}

.card h2{
    font-size:28px;
    margin-bottom:15px;
}

.valor{
    font-size:55px;
    font-weight:bold;
    margin-bottom:10px;
}

.verde .valor{
    color:#0f9b38;
}

.vermelho .valor{
    color:#d91b1b;
}

.box{
    background:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.box h3{
    font-size:32px;
    margin-bottom:10px;
}

.box p{
    color:#555;
    margin-bottom:20px;
}

.flex{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

input{
    flex:1;
    padding:16px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:18px;
}

button{
    background:#16a34a;
    color:white;
    border:none;
    padding:16px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#15803d;
}

.lista{
    margin-top:25px;
}

.item{
    background:#f9fafb;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.item-info h4{
    font-size:22px;
    margin-bottom:8px;
}

.item-info p{
    margin:0;
    color:#666;
    font-size:16px;
}

.item span{
    color:#d91b1b;
    font-size:24px;
    font-weight:bold;
}

@media(max-width:700px){

    h1{
        font-size:38px;
    }

    .valor{
        font-size:38px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>Controle de Gastos</h1>

<div class="cards">

<div class="card verde">
    <h2>Saldo Atual</h2>
    <div class="valor" id="saldo">R$ 0,00</div>
    <p>Valor que ainda tenho em caixa</p>
</div>

<div class="card vermelho">
    <h2>Total Gasto</h2>
    <div class="valor" id="totalGasto">R$ 0,00</div>
    <p>Valor que já foi gasto</p>
</div>

</div>

<div class="box">

<h3>Valor Inicial</h3>

<p>Informe quanto dinheiro você tem disponível.</p>

<div class="flex">
<input type="number" id="valorInicial" placeholder="Ex: 1000">
<button onclick="salvarValor()">Salvar Valor Inicial</button>
</div>

</div>

<div class="box">

<h3>Adicionar Gasto</h3>

<p>Preencha os dados do gasto.</p>

<div class="flex">
<input type="text" id="descricao" placeholder="Descrição do gasto">
<input type="number" id="valorGasto" placeholder="Valor gasto">
<button onclick="adicionarGasto()">Adicionar Gasto</button>
</div>

<div class="lista" id="lista"></div>

</div>

</div>

<script>

let saldo = 0;
let totalGasto = 0;

function atualizarTela(){

document.getElementById("saldo").innerHTML =
"R$ " + saldo.toFixed(2).replace(".", ",");

document.getElementById("totalGasto").innerHTML =
"R$ " + totalGasto.toFixed(2).replace(".", ",");

}

function salvarValor(){

saldo = parseFloat(document.getElementById("valorInicial").value) || 0;

atualizarTela();

}

function adicionarGasto(){

const descricao = document.getElementById("descricao").value;

const valor = parseFloat(
document.getElementById("valorGasto").value
);

if(!descricao || !valor){

alert("Preencha os campos!");
return;

}

saldo -= valor;
totalGasto += valor;

atualizarTela();

const lista = document.getElementById("lista");

const item = document.createElement("div");

item.classList.add("item");

const data = new Date();

const dataFormatada =
data.toLocaleDateString("pt-BR") +
" " +
data.toLocaleTimeString("pt-BR");

item.innerHTML = `

<div class="item-info">

<h4>${descricao}</h4>

<p>${dataFormatada}</p>

</div>

<span>- R$ ${valor.toFixed(2).replace(".", ",")}</span>

`;

lista.prepend(item);

document.getElementById("descricao").value = "";
document.getElementById("valorGasto").value = "";

}

</script>

</body>
</html>
