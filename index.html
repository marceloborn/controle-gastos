<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Gastos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f5f9;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:55px;
    margin-bottom:30px;
    color:#0f172a;
}

.cards{
    display:flex;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:280px;
    padding:30px;
    border-radius:20px;
    background:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h2{
    font-size:25px;
    margin-bottom:15px;
}

.card .valor{
    font-size:55px;
    font-weight:bold;
}

.verde{
    border:2px solid #b7f0c2;
    color:#0d8b2d;
}

.vermelho{
    border:2px solid #ffd0d0;
    color:#d10f0f;
}

.box{
    background:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.box h3{
    margin-bottom:15px;
    font-size:30px;
}

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #dcdcdc;
    font-size:18px;
    margin-bottom:15px;
}

.flex{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.flex input{
    flex:1;
}

button{
    background:#16a34a;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#15803d;
}

.lista{
    margin-top:20px;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f9fafb;
    padding:18px;
    border-radius:15px;
    margin-bottom:12px;
}

.item h4{
    font-size:20px;
}

.item span{
    color:red;
    font-size:22px;
    font-weight:bold;
}

@media(max-width:700px){

    h1{
        font-size:40px;
    }

    .card .valor{
        font-size:40px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>Controle de Gastos</h1>

<div class="cards">

<div class="card verde">
    <h2>Saldo Atual</h2>
    <div class="valor" id="saldo">R$ 0,00</div>
    <p>Valor que ainda tenho</p>
</div>

<div class="card vermelho">
    <h2>Total Gasto</h2>
    <div class="valor" id="totalGasto">R$ 0,00</div>
    <p>Valor que já foi gasto</p>
</div>

</div>

<div class="box">

<h3>Valor Inicial</h3>

<div class="flex">
<input type="number" id="valorInicial" placeholder="Ex: 1000">
<button onclick="salvarValor()">Salvar Valor Inicial</button>
</div>

</div>

<div class="box">

<h3>Adicionar Gasto</h3>

<div class="flex">
<input type="text" id="descricao" placeholder="Onde gastou?">
<input type="number" id="valorGasto" placeholder="Valor gasto">
<button onclick="adicionarGasto()">Adicionar Gasto</button>
</div>

<div class="lista" id="lista"></div>

</div>

</div>

<script>

let saldo = 0;
let totalGasto = 0;

function atualizarTela(){

document.getElementById("saldo").innerHTML =
"R$ " + saldo.toFixed(2).replace(".", ",");

document.getElementById("totalGasto").innerHTML =
"R$ " + totalGasto.toFixed(2).replace(".", ",");

}

function salvarValor(){

saldo = parseFloat(document.getElementById("valorInicial").value) || 0;

atualizarTela();

}

function adicionarGasto(){

const descricao = document.getElementById("descricao").value;
const valor = parseFloat(document.getElementById("valorGasto").value);

if(!descricao || !valor){

alert("Preencha os campos!");
return;

}

saldo -= valor;
totalGasto += valor;

atualizarTela();

const lista = document.getElementById("lista");

const item = document.createElement("div");

item.classList.add("item");

item.innerHTML = `

<div>
<h4>${descricao}</h4>
</div>

<span>- R$ ${valor.toFixed(2).replace(".", ",")}</span>

`;

lista.prepend(item);

document.getElementById("descricao").value = "";
document.getElementById("valorGasto").value = "";

}

</script>

</body>
  </html>
