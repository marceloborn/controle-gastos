<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --green-bg: #f0fdf4;
            --green-border: #bbf7d0;
            --green-text: #15803d;
            --green-btn: #16a34a;
            --green-btn-hover: #15803d;
            --red-bg: #fef2f2;
            --red-border: #fecaca;
            --red-text: #b91c1c;
            --red-btn: #ef4444;
            --border-color: #e2e8f0;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            padding-bottom: 80px; /* Espaço para o botão flutuante */
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        /* Cabeçalho Principal */
        .main-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .main-header .icon-bg {
            background-color: var(--text-main);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
        }

        /* Cards Superiores */
        .cards {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 250px;
            padding: 20px;
            border-radius: 16px;
            background: white;
            position: relative;
            box-shadow: var(--card-shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header h2 {
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-header i {
            font-size: 20px;
            opacity: 0.8;
        }

        .valor {
            font-size: 36px;
            font-weight: 700;
        }

        .verde {
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            color: var(--green-text);
        }

        .vermelho {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            color: var(--red-text);
        }

        /* Seção do Histórico (Agora é a principal) */
        .box {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .box-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
        }

        .box-header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .box-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .btn-config {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .btn-config:hover {
            color: var(--text-main);
        }

        /* Lista de Gastos */
        .lista {
            display: flex;
            flex-direction: column;
        }

        .lista-vazia {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .item-detalhes {
            flex: 1;
        }

        .item-desc {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .item-date {
            color: var(--text-muted);
            font-size: 12px;
        }

        .item-direita {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .item-value {
            color: var(--red-text);
            font-weight: 700;
            font-size: 16px;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 5px;
        }

        .btn-delete:hover {
            color: var(--red-btn);
        }

        /* Botão Flutuante (Adicionar Gasto) */
        .fab-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--green-btn);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.4);
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            z-index: 100;
        }

        .fab-button:active {
            transform: scale(0.95);
        }

        /* Janela Modal (Escondida por padrão) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 25px;
            transform: translateY(20px);
            transition: transform 0.3s;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 20px;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* Formulários no Modal */
        .input-wrapper {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-wrapper label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-size: 16px;
            outline: none;
            background: #f8fafc;
            transition: border-color 0.2s, background 0.2s;
        }

        input:focus {
            border-color: var(--green-btn);
            background: white;
        }

        .btn-salvar {
            background: var(--green-btn);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-salvar:active {
            background: var(--green-btn-hover);
        }

        /* Ocultar modais específicos */
        .modal-body {
            display: none;
        }

        .modal-body.active {
            display: block;
        }

        @media(max-width: 600px) {
            .fab-button {
                bottom: 20px;
                right: 20px;
            }
            .valor { font-size: 32px; }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="main-header">
        <div class="icon-bg">
            <i class="fa-solid fa-chart-pie"></i>
        </div>
        <h1>Financeiro</h1>
    </div>

    <!-- Resumo -->
    <div class="cards">
        <div class="card verde">
            <div class="card-header">
                <h2>Saldo Atual</h2>
                <i class="fa-solid fa-wallet"></i>
            </div>
            <div class="valor" id="saldoDisplay">R$ 0,00</div>
        </div>

        <div class="card vermelho">
            <div class="card-header">
                <h2>Total Gasto</h2>
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
            <div class="valor" id="totalGastoDisplay">R$ 0,00</div>
        </div>
    </div>

    <!-- Lista Organizada -->
    <div class="box">
        <div class="box-header">
            <div class="box-header-title">
                <i class="fa-solid fa-list-ul"></i>
                <h3>Histórico de Gastos</h3>
            </div>
            <!-- Botão para abrir configuração de saldo inicial -->
            <button class="btn-config" onclick="abrirModal('saldo')" title="Ajustar Saldo Inicial">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>

        <div class="lista" id="listaGastos">
            <!-- Itens gerados via JS -->
        </div>
    </div>

</div>

<!-- Botão Flutuante -->
<button class="fab-button" onclick="abrirModal('gasto')">
    <i class="fa-solid fa-plus"></i>
</button>

<!-- Fundo Escuro do Modal -->
<div class="modal-overlay" id="meuModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="tituloModal">Título</h3>
            <button class="btn-close" onclick="fecharModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- Formulário de Saldo Inicial (Escondido no modal) -->
        <div class="modal-body" id="modalSaldo">
            <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 14px;">
                Informe o valor que você tem em caixa antes dos gastos.
            </p>
            <div class="input-wrapper">
                <label>Valor em Caixa</label>
                <input type="text" id="valorInicial" placeholder="Ex: 1000,00" onkeyup="formatarMoeda(this)" inputmode="numeric">
            </div>
            <button class="btn-salvar" onclick="salvarValorInicial()">Atualizar Saldo</button>
        </div>

        <!-- Formulário de Adicionar Gasto (Escondido no modal) -->
        <div class="modal-body" id="modalGasto">
            <div class="input-wrapper">
                <label>O que você comprou?</label>
                <input type="text" id="descricao" placeholder="Ex: Almoço, Material...">
            </div>
            <div class="input-wrapper">
                <label>Qual o valor?</label>
                <input type="text" id="valorGasto" placeholder="Ex: 50,00" onkeyup="formatarMoeda(this)" inputmode="numeric">
            </div>
            <button class="btn-salvar" onclick="adicionarGasto()">Registrar Gasto</button>
        </div>

    </div>
</div>

<script>
    let valorInicial = 0;
    let gastos = [];

    // --- LÓGICA DO MODAL ---
    function abrirModal(tipo) {
        document.getElementById("meuModal").classList.add("active");
        
        // Esconde os dois formulários primeiro
        document.getElementById("modalSaldo").classList.remove("active");
        document.getElementById("modalGasto").classList.remove("active");

        if(tipo === 'saldo') {
            document.getElementById("tituloModal").innerText = "Ajustar Saldo Inicial";
            document.getElementById("modalSaldo").classList.add("active");
            document.getElementById("valorInicial").focus();
        } else {
            document.getElementById("tituloModal").innerText = "Novo Gasto";
            document.getElementById("modalGasto").classList.add("active");
            document.getElementById("descricao").focus();
        }
    }

    function fecharModal() {
        document.getElementById("meuModal").classList.remove("active");
    }

    // Fechar clicando fora da caixa
    document.getElementById('meuModal').addEventListener('click', function(e) {
        if (e.target === this) {
            fecharModal();
        }
    });
    // -----------------------

    function formatarMoeda(elemento) {
        let valor = elemento.value.replace(/\D/g, '');
        valor = (valor / 100).toFixed(2) + '';
        valor = valor.replace(".", ",");
        valor = valor.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        elemento.value = valor;
    }

    function parseMoeda(str) {
        if (!str) return 0;
        str = str.replace(/\./g, '').replace(',', '.');
        return parseFloat(str) || 0;
    }

    function formatarParaReal(valor) {
        return "R$ " + valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function obterEstiloIcone(descricao) {
        const desc = descricao.toLowerCase();
        if (desc.includes('almoço') || desc.includes('comida') || desc.includes('lanche') || desc.includes('açai') || desc.includes('açaí')) {
            return { icone: 'fa-utensils', cor: '#84cc16' }; 
        }
        if (desc.includes('mercado') || desc.includes('compras') || desc.includes('material')) {
            return { icone: 'fa-cart-shopping', cor: '#0ea5e9' }; 
        }
        if (desc.includes('combustível') || desc.includes('gasolina')) {
            return { icone: 'fa-gas-pump', cor: '#f59e0b' }; 
        }
        if (desc.includes('ferramenta') || desc.includes('peça') || desc.includes('madeira')) {
            return { icone: 'fa-hammer', cor: '#64748b' }; 
        }
        return { icone: 'fa-receipt', cor: '#8b5cf6' }; 
    }

    function carregarDados() {
        const dadosSalvos = localStorage.getItem('appGastos');
        const valorSalvo = localStorage.getItem('appValorInicial');

        if (dadosSalvos) gastos = JSON.parse(dadosSalvos);
        if (valorSalvo) {
            valorInicial = parseFloat(valorSalvo);
            document.getElementById("valorInicial").value = valorInicial.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }
        atualizarTela();
    }

    function salvarDados() {
        localStorage.setItem('appGastos', JSON.stringify(gastos));
        localStorage.setItem('appValorInicial', valorInicial.toString());
    }

    function salvarValorInicial() {
        const inputValor = document.getElementById("valorInicial").value;
        valorInicial = parseMoeda(inputValor);
        salvarDados();
        atualizarTela();
        fecharModal();
    }

    function adicionarGasto() {
        const descricaoInput = document.getElementById("descricao");
        const valorInput = document.getElementById("valorGasto");

        const descricao = descricaoInput.value.trim();
        const valor = parseMoeda(valorInput.value);

        if (!descricao || valor <= 0) {
            alert("Por favor, preencha a descrição e um valor maior que zero.");
            return;
        }

        const data = new Date();
        const dataFormatada = data.toLocaleDateString("pt-BR") + " às " + data.toLocaleTimeString("pt-BR", {hour: '2-digit', minute:'2-digit'});

        gastos.unshift({
            id: Date.now(),
            descricao: descricao,
            valor: valor,
            data: dataFormatada
        });
        
        salvarDados();
        atualizarTela();

        descricaoInput.value = "";
        valorInput.value = "";
        fecharModal();
    }

    function deletarGasto(id) {
        if(confirm("Tem certeza que deseja apagar este gasto?")) {
            gastos = gastos.filter(gasto => gasto.id !== id);
            salvarDados();
            atualizarTela();
        }
    }

    function atualizarTela() {
        let totalGasto = 0;
        const listaHtml = document.getElementById("listaGastos");
        listaHtml.innerHTML = "";

        if(gastos.length === 0) {
            listaHtml.innerHTML = `<div class="lista-vazia">Nenhum gasto registrado ainda.</div>`;
        }

        gastos.forEach(gasto => {
            totalGasto += gasto.valor;
            const estilo = obterEstiloIcone(gasto.descricao);
            
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <div class="item-icon" style="background-color: ${estilo.cor}">
                    <i class="fa-solid ${estilo.icone}"></i>
                </div>
                <div class="item-detalhes">
                    <div class="item-desc">${gasto.descricao}</div>
                    <div class="item-date">${gasto.data}</div>
                </div>
                <div class="item-direita">
                    <div class="item-value">- ${formatarParaReal(gasto.valor)}</div>
                    <button class="btn-delete" onclick="deletarGasto(${gasto.id})">
                        <i class="fa-solid fa-trash-can"></i> Apagar
                    </button>
                </div>
            `;
            listaHtml.appendChild(div);
        });

        const saldoAtual = valorInicial - totalGasto;

        document.getElementById("saldoDisplay").innerText = formatarParaReal(saldoAtual);
        document.getElementById("totalGastoDisplay").innerText = formatarParaReal(totalGasto);
    }

    carregarDados();

</script>

</body>
</html>
